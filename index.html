<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EQUIPAR SAS - Seguridad Industrial</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #004080, #0073e6);
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    img {
      max-width: 200px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 30px;
    }
    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #ffcc00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <meta http-equiv="refresh" content="5;url=https://ingequipar.wixsite.com/equipar">
</head>
<body>
  <div class="container">
    <img src="logo-equipar.png" alt="Logo EQUIPAR SAS">
    <h1>Bienvenido a EQUIPAR SAS</h1>
    <p>Estamos redirigiéndote a nuestro sitio oficial de seguridad industrial.</p>
    <div class="loader"></div>
    <p style="margin-top:15px;">Si no eres redirigido automáticamente, haz clic 
      <a href="https://ingequipar.wixsite.com/equipar" style="color:#ffcc00;">aquí</a>.
    </p>
  </div>
</body>
</html>
